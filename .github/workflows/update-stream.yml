name: YouTube Kanalları - Canlı Yayın Güncelleme

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-stream:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Kodu çek
        uses: actions/checkout@v4

      - name: 🐍 Python kurulumu
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Deno kurulumu
        uses: denoland/setup-deno@v2
        with:
          deno-version: latest

      - name: 📦 yt-dlp kur
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade -r requirements.txt

      - name: 🔧 Sürümleri kontrol et
        run: |
          yt-dlp --version
          deno --version
          which deno

      - name: 🍪 Cookies'i çöz
        run: |
          echo "${{ secrets.YOUTUBE_COOKIES }}" | base64 -d > cookies.txt

          if [ ! -s cookies.txt ]; then
            echo "❌ cookies.txt boş!"
            exit 1
          fi

          echo "✅ Cookies yüklendi"

      - name: 🎬 Playlist klasörüne M3U listelerini oluştur
        run: |
          python update_stream.py

      - name: ✅ Playlist klasörünü kontrol et
        run: |
          if [ ! -s playlist/playerlist.m3u ]; then
            echo "❌ player/playerlist.m3u oluşmadı!"
            echo "📁 Ana klasör:"
            ls -la
            echo "📁 Playlist klasörü:"
            ls -la playlist || true
            exit 1
          fi

          echo "✅ playlist/playerlist.m3u başarıyla oluşturuldu"
          head -40 playlist/playerlist.m3u
          echo "📄 playlist klasöründeki M3U dosyaları:"
          ls -1 playlist/*.m3u

      - name: 📤 GitHub'a gönder
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          git add playlist/*.m3u config.json update_stream.py requirements.txt .github/workflows/update-stream.yml

          git diff --cached --quiet || git commit -m "🔄 Player M3U listelerini güncelle: $(date '+%Y-%m-%d %H:%M:%S')"

          git push
