name: TV Kanalları - M3U8 Güncelleme

on:
  # Her 1 saatte bir çalıştır
  schedule:
    - cron: '0 * * * *'
  
  # Manuel tetikleme
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-stream:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 📥 Kodu çek
        uses: actions/checkout@v4

      - name: 🐍 Python kurulumu
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 yt-dlp ve bağımlılıkları kur
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade yt-dlp requests

      - name: 🔧 yt-dlp versiyon kontrol
        run: yt-dlp --version

      - name: 🍪 Cookies hazırla (YouTube için)
        run: |
          if [ -n "${{ secrets.YOUTUBE_COOKIES }}" ]; then
            echo "${{ secrets.YOUTUBE_COOKIES }}" | base64 -d > cookies.txt
            echo "✅ Cookies yüklendi"
          else
            echo "⚠️ YOUTUBE_COOKIES secret yok - YouTube kanalları kısıtlı çalışabilir"
            touch cookies.txt
          fi

      - name: 🎬 M3U8 playlist oluştur
        run: python update_stream.py

      - name: ✅ Çıktıları kontrol et
        run: |
          if [ ! -s playlist/playlist.m3u8 ]; then
            echo "❌ playlist/playlist.m3u8 oluşmadı!"
            ls -la playlist/ || echo "playlist klasörü yok"
            exit 1
          fi
          
          echo "=========================================="
          echo "✅ M3U8 dosyaları oluşturuldu:"
          echo "=========================================="
          ls -la playlist/*.m3u8 2>/dev/null | awk '{print "   📺 " $9 " (" $5 " bytes)"}'
          
          echo ""
          echo "Ana playlist ilk 20 satır:"
          echo "------------------------------------------"
          head -20 playlist/playlist.m3u8

      - name: 📤 GitHub'a gönder
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # playlist klasöründeki tüm .m3u8 dosyalarını ekle
          git add playlist/*.m3u8
          git add config.json update_stream.py
          
          # Değişiklik varsa commit ve push
          if git diff --cached --quiet; then
            echo "ℹ️ Değişiklik yok, commit gerekmiyor"
          else
            TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M:%S UTC')
            git commit -m "🔄 M3U8 güncelleme | ${TIMESTAMP}"
            git push
            echo "✅ Değişiklikler push edildi"
          fi

      - name: 📊 Sonuç özeti
        if: always()
        run: |
          echo "=========================================="
          echo "İŞLEM TAMAMLANDI"
          echo "=========================================="
          echo "Zaman: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "Durum: ${{ job.status }}"
          
          if [ -f "playlist/playlist.m3u8" ]; then
            KANAL_SAYISI=$(grep -c "^#EXTINF" playlist/playlist.m3u8)
            echo "Toplam kanal: $KANAL_SAYISI"
          fi
