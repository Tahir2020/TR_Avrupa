name: TV Kanalları - Playlist Güncelleme

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-stream:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Kodu çek
        uses: actions/checkout@v4

      - name: 🐍 Python kurulumu
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Python paketlerini kur
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade requests

      - name: 🔧 Sürüm kontrolü
        run: |
          python -c "import requests; print('requests:', requests.__version__)"

      - name: 🎬 M3U listelerini oluştur
        run: |
          python update_stream.py

      - name: ✅ Playlist kontrolü
        run: |
          if [ ! -s playlist/playerlist.m3u ]; then
            echo "❌ playlist/playerlist.m3u oluşmadı!"
            echo "📁 Ana klasör içeriği:"
            ls -la
            echo "📁 Playlist klasörü içeriği:"
            ls -la playlist 2>/dev/null || echo "playlist klasörü yok veya boş"
            exit 1
          fi

          echo "✅ playlist/playerlist.m3u başarıyla oluşturuldu"
          echo ""
          echo "📄 İlk 20 satır:"
          head -20 playlist/playerlist.m3u
          echo ""
          echo "📄 Oluşan M3U dosyaları:"
          ls -1 playlist/*.m3u 2>/dev/null || echo "Hiç M3U dosyası yok"

      - name: 📤 GitHub'a gönder
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          git add playlist/*.m3u config.json update_stream.py requirements.txt .github/workflows/update-stream.yml 2>/dev/null || true

          if git diff --cached --quiet; then
            echo "ℹ️ Değişiklik yok, commit gerekmiyor"
          else
            git commit -m "🔄 Playlist M3U güncelleme: $(date '+%Y-%m-%d %H:%M:%S')"
            git push
            echo "✅ Değişiklikler pushlandı"
          fi
