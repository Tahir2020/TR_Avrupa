name: ✅ Türkiye Yotube Canlı Yayın Güncelleme..


on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-streams:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Kodu çek
        uses: actions/checkout@v4

      - name: 🐍 Python kurulumu
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Deno kurulumu
        uses: denoland/setup-deno@v2
        with:
          deno-version: latest

      - name: 📦 yt-dlp kurulumu
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade yt-dlp

      - name: 🔧 Versiyon kontrolü
        run: |
          yt-dlp --version
          deno --version

      - name: 🍪 Cookies (opsiyonel - devre dışı)
        run: |
          # Cookies kullanmayacağız - yt-dlp cookies'siz çalışacak
          echo "ℹ️ Cookies kullanılmadan devam ediliyor"
          # Eski cookies.txt varsa sil
          rm -f cookies.txt

      - name: 🎬 M3U playlist'leri oluştur
        run: |
          python update_stream.py

      - name: 📊 M3U dosyalarını kontrol et
        run: |
          echo "=== Çıktı dosyaları ==="
          if [ -f playerlist.m3u ]; then
            echo "✅ playerlist.m3u oluşturuldu"
            echo "📺 Kanal sayısı: $(grep -c '#EXTINF' playerlist.m3u)"
            echo ""
            echo "📋 İlk 15 satır:"
            head -15 playerlist.m3u
          else
            echo "❌ playerlist.m3u bulunamadı!"
            exit 1
          fi
          
          if [ -d output ] && [ "$(ls -A output)" ]; then
            echo ""
            echo "📁 output dizini içeriği:"
            ls -la output/ | head -10
          fi

      - name: 📤 GitHub'a gönder
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          git add playerlist.m3u output/*.m3u 2>/dev/null || true
          
          if git diff --cached --quiet; then
            echo "ℹ️ Değişiklik yok"
          else
            git commit -m "🔄 Otomatik güncelleme: $(date '+%Y-%m-%d %H:%M:%S')"
            git push
            echo "✅ GitHub'a gönderildi"
          fi
