name: TV Kanalları - Playlist Güncelleme

on:
  schedule:
    - cron: '0 * * * *'  # Her saat başı (1 saatte bir)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-stream:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Kodu çek
        uses: actions/checkout@v4

      - name: 🐍 Python kurulumu
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Deno kurulumu
        uses: denoland/setup-deno@v2
        with:
          deno-version: latest

      - name: 📦 Gerekli paketleri kur
        run: |
          python -m pip install --upgrade pip
          python -m pip install requests yt-dlp

      - name: 🔧 Sürümleri kontrol et
        run: |
          yt-dlp --version
          deno --version
          which deno
          python --version

      - name: 🍪 Cookies'i hazırla
        run: |
          if [ -n "${{ secrets.YOUTUBE_COOKIES }}" ]; then
            echo "${{ secrets.YOUTUBE_COOKIES }}" | base64 -d > cookies.txt
            echo "✅ Cookies yüklendi"
            ls -la cookies.txt
          else
            touch cookies.txt
            echo "⚠️ YOUTUBE_COOKIES secret yok, boş cookies.txt ile devam ediliyor"
          fi

      - name: 🎬 Playlist oluştur
        run: |
          python update_stream.py

      - name: ✅ Playlist kontrolü
        run: |
          # Çıktı dosyasını kontrol et
          if [ -f playlist/playlist.m3u8 ]; then
            echo "✅ playlist/playlist.m3u8 başarıyla oluşturuldu"
            echo "📄 Dosya boyutu: $(du -h playlist/playlist.m3u8 | cut -f1)"
            echo ""
            echo "📺 İlk 30 satır:"
            head -30 playlist/playlist.m3u8
          else
            echo "❌ playlist/playlist.m3u8 oluşturulamadı!"
            echo "📁 Ana klasör içeriği:"
            ls -la
            echo "📁 Playlist klasörü:"
            ls -la playlist || true
            exit 1
          fi
          
          echo ""
          echo "📄 Playlist klasöründeki tüm dosyalar:"
          ls -la playlist/

      - name: 📤 GitHub'a gönder
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # Değişiklikleri ekle
          git add playlist/playlist.m3u8 playlist/*.m3u8 2>/dev/null || true
          git add config.json update_stream.py cookies.txt 2>/dev/null || true
          git add .github/workflows/*.yml
          
          # Değişiklik varsa commit ve push
          if git diff --cached --quiet; then
            echo "ℹ️ Değişiklik yok, commit gerekmiyor"
          else
            git commit -m "🔄 Playlist güncellemesi: $(date '+%Y-%m-%d %H:%M:%S')"
            git push
            echo "✅ Değişiklikler GitHub'a gönderildi"
          fi
