name: TV Kanalları - Playlist Güncelleme

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-stream:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Kodu çek
        uses: actions/checkout@v4

      - name: 🐍 Python kurulumu
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 yt-dlp kur (en son sürüm)
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade yt-dlp requests

      - name: 🍪 Cookies'i hazırla
        run: |
          if [ -n "${{ secrets.YOUTUBE_COOKIES }}" ]; then
            echo "${{ secrets.YOUTUBE_COOKIES }}" | base64 -d > cookies.txt
            echo "✅ Cookies yüklendi"
            cat cookies.txt | head -5
          else
            echo "⚠️ YOUTUBE_COOKIES secret yok"
            exit 1
          fi

      - name: 🎬 M3U8 listelerini oluştur
        run: python update_stream.py

      - name: 📤 GitHub'a gönder
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add playlist/*.m3u8 config.json update_stream.py
          git diff --cached --quiet || git commit -m "🔄 M3U8 güncelleme: $(date '+%Y-%m-%d %H:%M:%S')"
          git push
