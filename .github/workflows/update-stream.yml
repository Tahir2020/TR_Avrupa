name: TV Kanalları - Playlist Güncelleme

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-stream:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Kodu çek
        uses: actions/checkout@v4

      - name: 🐍 Python kurulumu
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 yt-dlp ve requests kur
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade yt-dlp requests

      - name: 🔧 yt-dlp güncelle ve test
        run: |
          yt-dlp -U || true
          yt-dlp --version

      - name: 🎬 M3U listelerini oluştur
        run: |
          python update_stream.py

      - name: ✅ Playlist kontrolü
        run: |
          if [ ! -s playlist/playerlist.m3u ]; then
            echo "❌ playlist/playerlist.m3u oluşmadı!"
            echo "📁 Ana klasör içeriği:"
            ls -la
            echo "📁 Playlist klasörü içeriği:"
            ls -la playlist 2>/dev/null || echo "playlist klasörü yok"
            exit 1
          fi

          echo "✅ playlist/playerlist.m3u başarıyla oluşturuldu"
          echo ""
          echo "📄 İlk 20 satır:"
          head -20 playlist/playerlist.m3u
          echo ""
          echo "📄 Oluşan M3U dosyaları:"
          ls -la playlist/*.m3u 2>/dev/null || echo "M3U dosyası yok"

      - name: 📤 GitHub'a gönder
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add playlist/*.m3u config.json update_stream.py requirements.txt .github/workflows/update-stream.yml 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "ℹ️ Değişiklik yok"
          else
            git commit -m "🔄 Playlist güncelleme: $(date '+%Y-%m-%d %H:%M:%S')"
            git push
            echo "✅ Pushlandı"
          fi
