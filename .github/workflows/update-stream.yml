name: TV Kanalları - Playlist Güncelleme

on:
  schedule:
    - cron: '0 */2 * * *'  # Her 2 saatte bir
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-stream:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Kodu çek
        uses: actions/checkout@v4

      - name: 🐍 Python kurulumu
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 yt-dlp kur (güncel)
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade yt-dlp requests

      - name: 🔧 yt-dlp versiyon kontrol
        run: yt-dlp --version

      - name: 🍪 Cookies hazırla (YouTube için)
        run: |
          if [ -n "${{ secrets.YOUTUBE_COOKIES }}" ]; then
            echo "${{ secrets.YOUTUBE_COOKIES }}" | base64 -d > cookies.txt
            echo "✅ Cookies yüklendi ($(wc -l < cookies.txt) satır)"
          else
            echo "⚠️ YOUTUBE_COOKIES secret yok - YouTube kanalları kısıtlı çalışabilir"
            touch cookies.txt
          fi

      - name: 🎬 Playlist oluştur
        run: python update_stream.py

      - name: ✅ Kontrol
        run: |
          if [ ! -s playlist/playerlist.m3u ]; then
            echo "❌ playlist/playerlist.m3u oluşmadı!"
            exit 1
          fi
          echo "✅ Dosya sayısı: $(ls -1 playlist/*.m3u | wc -l)"
          head -20 playlist/playerlist.m3u

      - name: 📤 GitHub'a gönder
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add playlist/*.m3u config.json update_stream.py
          git diff --cached --quiet || git commit -m "🔄 Playlist güncelleme: $(date '+%Y-%m-%d %H:%M')"
          git push
