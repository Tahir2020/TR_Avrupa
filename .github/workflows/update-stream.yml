name: Türkiye IPTV - 25 Kanal Canlı Yayın Güncelleme

on:
  schedule:
    - cron: '0 * * * *'  # Her saat başı
  workflow_dispatch:  # Manuel tetikleme

permissions:
  contents: write

jobs:
  update-streams:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Kodu çek
        uses: actions/checkout@v4

      - name: 🐍 Python kurulumu
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Deno kurulumu (JavaScript runtime)
        uses: denoland/setup-deno@v2
        with:
          deno-version: latest

      - name: 📦 yt-dlp ve bağımlılıklar
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade yt-dlp

      - name: 🔧 Sürüm kontrolü
        run: |
          yt-dlp --version
          deno --version

      - name: 🍪 YouTube Cookies çözümleme
        run: |
          if [ -n "${{ secrets.YOUTUBE_COOKIES }}" ]; then
            echo "${{ secrets.YOUTUBE_COOKIES }}" | base64 -d > cookies.txt
            if [ -s cookies.txt ]; then
              echo "✅ cookies.txt başarıyla yüklendi ($(wc -l < cookies.txt) satır)"
            else
              echo "⚠️ cookies.txt oluşturuldu ancak boş!"
              echo "Devam ediliyor (cookies olmadan dene)..."
            fi
          else
            echo "⚠️ YOUTUBE_COOKIES secret'ı bulunamadı, cookies'siz devam ediliyor"
          fi

      - name: 🎬 M3U playlist'leri oluştur
        run: |
          python update_stream.py

      - name: ✅ M3U dosyalarını kontrol et
        run: |
          if [ ! -s playerlist.m3u ]; then
            echo "❌ playerlist.m3u oluşmadı veya boş!"
            ls -la
            exit 1
          fi
          
          echo "✅ Ana playlist oluşturuldu"
          echo "📊 İlk 20 satır:"
          head -20 playerlist.m3u
          
          echo ""
          echo "📁 Çıktı dizini içeriği:"
          ls -la output/ | head -15

      - name: 📤 GitHub'a gönder
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          git add playerlist.m3u output/*.m3u 2>/dev/null || true
          
          if ! git diff --cached --quiet; then
            git commit -m "🔄 Otomatik güncelleme: $(date '+%Y-%m-%d %H:%M:%S')"
            git push
            echo "✅ Değişiklikler GitHub'a gönderildi"
          else
            echo "ℹ️ Değişiklik yok, göndermeye gerek yok"
          fi
