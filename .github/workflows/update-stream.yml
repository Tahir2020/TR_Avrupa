name: TV Kanalları - Playlist Güncelleme

on:
  schedule:
    - cron: '0 * * * *'  # Her 1 saatte bir
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-stream:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Kodu çek
        uses: actions/checkout@v4

      - name: 🐍 Python kurulumu
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Deno kurulumu
        uses: denoland/setup-deno@v2
        with:
          deno-version: v1.x

      - name: 📦 yt-dlp ve bağımlılıkları kur
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade yt-dlp requests

      - name: 🔧 Sürümleri kontrol et
        run: |
          yt-dlp --version
          deno --version
          which deno

      - name: 🍪 Cookies'i hazırla
        run: |
          if [ -n "${{ secrets.YOUTUBE_COOKIES }}" ]; then
            echo "${{ secrets.YOUTUBE_COOKIES }}" | base64 -d > cookies.txt
            echo "✅ Cookies yüklendi"
          else
            touch cookies.txt
            echo "⚠️ YOUTUBE_COOKIES secret yok, boş cookies.txt ile devam ediliyor"
          fi

      - name: 🎬 Playlist klasörüne M3U8 listelerini oluştur
        run: |
          python update_stream.py

      - name: ✅ Playlist klasörünü kontrol et
        run: |
          if [ ! -s playlist/playlist.m3u8 ]; then
            echo "❌ playlist/playlist.m3u8 oluşmadı!"
            echo "📁 Ana klasör:"
            ls -la
            echo "📁 Playlist klasörü:"
            ls -la playlist || true
            exit 1
          fi

          echo "✅ playlist/playlist.m3u8 başarıyla oluşturuldu"
          echo "📄 İlk 10 satır:"
          head -10 playlist/playlist.m3u8
          echo ""
          echo "📄 playlist klasöründeki M3U8 dosyaları:"
          ls -1 playlist/*.m3u8 | head -20

      - name: 📤 GitHub'a gönder
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          git add playlist/*.m3u8 config.json update_stream.py requirements.txt .github/workflows/update-stream.yml

          if ! git diff --cached --quiet; then
            git commit -m "🔄 M3U8 playlist güncelleme: $(date '+%Y-%m-%d %H:%M:%S')"
            git push
          else
            echo "✅ Değişiklik yok, commit gerekmiyor"
          fi
