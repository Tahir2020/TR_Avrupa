name: ✅ Türkiye Yotube Canlı Yayın Güncelleme..

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-streams:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Kodu çek
        uses: actions/checkout@v4

      - name: 🐍 Python kurulumu
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 yt-dlp kurulumu
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade yt-dlp

      - name: 🔧 yt-dlp test
        run: |
          yt-dlp --version
          echo "✅ yt-dlp hazır"

      - name: 🎬 M3U playlist'leri oluştur
        run: |
          python update_stream.py

      - name: 📊 Sonuçları kontrol et
        run: |
          echo "=== ÇIKTILAR ==="
          
          if [ -f playerlist.m3u ]; then
            KANAL_SAYISI=$(grep -c '#EXTINF' playerlist.m3u)
            CALISAN=$(grep -c '✅' playerlist.m3u || echo "0")
            echo "✅ playerlist.m3u oluşturuldu"
            echo "📺 Toplam kanal: $KANAL_SAYISI"
            echo ""
            echo "📋 İlk 20 satır:"
            head -20 playerlist.m3u
          else
            echo "❌ playerlist.m3u bulunamadı!"
            exit 1
          fi
          
          if [ -d output ] && [ "$(ls -A output 2>/dev/null)" ]; then
            echo ""
            echo "📁 output dizini:"
            ls -la output/ | head -10
          fi

      - name: 📤 GitHub'a gönder
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          git add playerlist.m3u output/*.m3u 2>/dev/null || true
          
          if git diff --cached --quiet; then
            echo "ℹ️ Değişiklik yok"
          else
            git commit -m "🔄 Otomatik güncelleme: $(date '+%Y-%m-%d %H:%M:%S')"
            git push
            echo "✅ GitHub'a gönderildi"
          fi
